<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ໜ້າຜູ້ດູແລລະບົບ</title>
    <link rel="icon" href="../assets/favicon.ico" sizes="any" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --em-900: #043d31;
        --em-700: #047857;
        --em-600: #059669;
        --muted: #5f7d73;
        --line: #d7e5df;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Noto Sans Lao", system-ui, sans-serif;
        background: linear-gradient(140deg, var(--em-900), var(--em-700));
        color: #08221b;
      }
      .card {
        background: #fff;
        border-radius: 22px;
        max-width: 460px;
        width: 100%;
        padding: 32px 28px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      img {
        width: 84px;
        height: 84px;
        border-radius: 22px;
      }
      h1 {
        font-size: 25px;
        font-weight: 900;
        color: var(--em-700);
        margin: 14px 0 4px;
      }
      p {
        color: var(--muted);
        font-size: 14.5px;
        margin: 0 0 24px;
      }
      a.b {
        display: block;
        text-decoration: none;
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 11px;
        font-weight: 800;
        font-size: 17px;
        text-align: left;
      }
      a.b .d {
        display: block;
        font-weight: 500;
        font-size: 13.5px;
        opacity: 0.8;
        margin-top: 3px;
      }
      a.b.p {
        background: var(--em-700);
        color: #fff;
      }
      a.b.p:hover {
        background: var(--em-900);
      }
      a.b.s {
        background: #fff;
        border: 1px solid var(--line);
        color: #234b40;
      }
      a.b.s:hover {
        background: #ecfdf5;
        border-color: var(--em-600);
      }
      .foot {
        margin-top: 18px;
        font-size: 12.5px;
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="../assets/android-chrome-192x192.png" alt="" />
      <h1>ໜ້າຜູ້ດູແລລະບົບ</h1>
      <p>ສະເພາະເຈົ້າຂອງລະບົບເທົ່ານັ້ນ</p>

      <a class="b p" href="./owner.html">
        ຈັດການລູກຄ້າ / License
        <span class="d">ສ້າງລະຫັດ · ຕໍ່ອາຍຸ · ຕັດສິດ · ບັນທຶກຂຶ້ນ GitHub</span>
      </a>
      <a class="b s" href="./dashboard.html">
        ພາບລວມ / Dashboard
        <span class="d">ຍອດລາຍວັນ · ລູກຄ້າ · ເລກສ່ຽງ · ກວດເລກທີ່ອອກ</span>
      </a>
      <a class="b s" href="../index.html">
        ໜ້າຄິດໄລ່ໂພຍ
        <span class="d">ໜ້າທີ່ລູກຄ້າໃຊ້</span>
      </a>

      <div class="foot">
        ໂຟນເດີ <b>/admin/</b> ບໍ່ຖືກເກັບ cache — ອັບເດດແລ້ວເຫັນຜົນທັນທີ
      </div>
    </div>
  </body>
</html>
